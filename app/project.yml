name: NoiseAI
options:
  bundleIdPrefix: com.noiseai
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    INFOPLIST_FILE: Sources/App/Info.plist
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridge/NoiseApp-Bridging-Header.h
    HEADER_SEARCH_PATHS:
      - "$(PROJECT_DIR)/../bridge/include"
    LIBRARY_SEARCH_PATHS:
      - "$(PROJECT_DIR)/../build/bridge"
      - "$(PROJECT_DIR)/../build/engine"
      - "$(PROJECT_DIR)/../build/third_party"
      - "$(PROJECT_DIR)/../third_party/onnxruntime/onnxruntime-osx-arm64-1.24.3/lib"
    OTHER_LDFLAGS:
      - "-lnoisebridge"
      - "-lnoiseengine"
      - "-lrnnoise"
      - "-lonnxruntime"
      - "-lc++"

targets:
  NoiseAI:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/*.md"
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/Models
        buildPhase: resources
        type: folder
    postBuildScripts:
      - name: "Bundle DeepFilterNet Model"
        script: |
          mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Models"
          cp "${PROJECT_DIR}/Resources/Models/deepfilternet.onnx" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Models/deepfilternet.onnx"
        inputFiles:
          - $(PROJECT_DIR)/Resources/Models/deepfilternet.onnx
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Models/deepfilternet.onnx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noiseai.app
        PRODUCT_NAME: NoiseAI
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: NoiseAI.entitlements
    info:
      path: Sources/App/Info.plist
      properties:
        NSMicrophoneUsageDescription: "NoiseAI needs microphone access to capture audio and apply noise cancellation."
